<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>心理对话协助</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <a class="brand" href="/" aria-label="心理对话协助首页"><span>心</span>心理对话协助</a>
        <nav aria-label="页面操作">
          <button id="newSessionBtn" class="ghost hidden" type="button">新会话</button>
          <button id="logoutBtn" class="ghost hidden" type="button">退出</button>
        </nav>
      </header>

      <section id="authView" class="auth-card">
        <div class="head">
          <h1>登录</h1>
          <p>进入心理对话协助，继续你的支持会话。首次使用可直接注册。</p>
        </div>
        <label>用户名 / 邮箱 <input id="username" autocomplete="username" minlength="2" placeholder="请输入用户名或邮箱" autofocus /></label>
        <label class="password-field">
          密码
          <span>
            <input id="password" type="password" autocomplete="current-password" minlength="6" placeholder="至少 6 位" />
            <button id="togglePasswordBtn" class="icon-btn" type="button" aria-label="显示或隐藏密码">显示</button>
          </span>
        </label>
        <p id="authStatus" class="status" role="alert"></p>
        <div class="actions">
          <button id="loginBtn" type="button">登录</button>
          <button id="registerBtn" class="secondary" type="button">注册账号</button>
        </div>
        <button class="link-btn" type="button">忘记密码？</button>
      </section>

      <section id="consentView" class="document-card hidden">
        <div class="head">
          <h1>用户知情同意书</h1>
          <p>继续前请阅读隐私政策与服务条款。本系统不替代专业诊疗。</p>
        </div>
        <article class="policy-box" tabindex="0">
          <h2>数据使用</h2>
          <p>系统会保存账号信息、会话内容、风险评估和必要运行日志，用于连续会话、安全监测和服务改进。</p>
          <h2>风险提示</h2>
          <p>如果你正在经历自伤、自杀或伤害他人的强烈冲动，请立即联系当地紧急救助电话或可信任的人。</p>
          <h2>用户权利</h2>
          <p>你可以联系管理员请求查看、更正或删除相关数据。</p>
        </article>
        <label class="checkline">
          <input id="consentCheck" type="checkbox" />
          我已阅读并同意隐私政策与服务条款
        </label>
        <p id="consentStatus" class="status" role="alert"></p>
        <div class="actions">
          <button id="cancelConsentBtn" class="secondary" type="button">取消</button>
          <button id="consentBtn" type="button">我已阅读并同意</button>
        </div>
      </section>

      <section id="chatView" class="chat-layout hidden">
        <aside class="side">
          <div class="profile">
            <span id="avatar">访</span>
            <div>
              <span id="currentUser" class="profile-name">-</span>
              <small>普通用户</small>
            </div>
          </div>
          <dl>
            <dt>风险</dt>
            <dd id="riskLevel">未评估</dd>
            <dt>分数</dt>
            <dd id="riskScore">-</dd>
            <dt>话题</dt>
            <dd id="coveredTopics">-</dd>
            <dt>下一步</dt>
            <dd id="nextTopic">-</dd>
          </dl>
        </aside>

        <section class="conversation">
          <header>
            <div>
              <h1>心理对话</h1>
              <p>系统回复仅用于支持性沟通，不替代专业诊疗。</p>
            </div>
            <span id="riskChip">未评估</span>
          </header>
          <div id="messages" class="messages" role="log" aria-live="polite"></div>
          <form id="chatForm" class="composer">
            <textarea id="messageInput" rows="3" placeholder="写下此刻最真实的一句话"></textarea>
            <button type="submit" aria-label="发送消息">发送</button>
          </form>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
