<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>心理对话协助</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="topbar">
        <div>
          <h1>心理对话协助</h1>
          <p>支持对话 · 风险判断 · 话题覆盖</p>
        </div>
        <button id="logoutBtn" class="ghost hidden" type="button">退出</button>
      </section>

      <section id="authView" class="panel">
        <div class="panel-head">
          <h2>登录</h2>
          <p>首次使用可直接注册。</p>
        </div>
        <label>用户名 <input id="username" autocomplete="username" minlength="2" placeholder="至少 2 个字符" /></label>
        <label>密码 <input id="password" type="password" autocomplete="current-password" minlength="6" placeholder="至少 6 位" /></label>
        <div class="actions">
          <button id="loginBtn" type="button">登录</button>
          <button id="registerBtn" class="secondary" type="button">注册</button>
        </div>
        <p id="authStatus" class="status"></p>
      </section>

      <section id="consentView" class="panel hidden">
        <div class="panel-head">
          <h2>使用确认</h2>
          <p>继续前请完成必要确认。</p>
        </div>
        <label class="checkline">
          <input id="consentCheck" type="checkbox" />
          我已确认并继续使用
        </label>
        <button id="consentBtn" type="button">继续</button>
        <p id="consentStatus" class="status"></p>
      </section>

      <section id="chatView" class="chat-layout hidden">
        <aside class="side">
          <h2>状态</h2>
          <dl>
            <dt>用户</dt>
            <dd id="currentUser">-</dd>
            <dt>风险</dt>
            <dd id="riskLevel">-</dd>
            <dt>分数</dt>
            <dd id="riskScore">-</dd>
            <dt>话题</dt>
            <dd id="coveredTopics">-</dd>
            <dt>下一步</dt>
            <dd id="nextTopic">-</dd>
          </dl>
        </aside>

        <section class="conversation">
          <div id="messages" class="messages" aria-live="polite"></div>
          <form id="chatForm" class="composer">
            <textarea id="messageInput" rows="3" placeholder="写下你现在最想说的一句话"></textarea>
            <button type="submit">发送</button>
          </form>
        </section>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
