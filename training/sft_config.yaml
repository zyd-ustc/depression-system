# SFT config for depression clinician model. Use with LLaMA-Factory:
#   llamafactory-cli train sft_config.yaml
# Set MODEL_PATH and OUTPUT_DIR via env or edit below.

# Edit model_name_or_path and output_dir before running.
model_name_or_path: THUDM/chatglm4-9b
trust_remote_code: true

stage: sft
do_train: true
finetuning_type: full

dataset: depression_dialogue
template: glm4
cutoff_len: 4096
max_samples: 10000
overwrite_cache: true
preprocessing_num_workers: 8

output_dir: ./saves/depression-sft
logging_steps: 10
plot_loss: true
overwrite_output_dir: true
save_strategy: epoch

per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 5.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
fp16: true

do_eval: false
val_size: 0.1
